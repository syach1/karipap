version: '3'

vars:
  BUILDBOT: https://buildbot.libretro.com/nightly/android/latest
  CORES_DIR: app/src/main/jniLibs
  KITCHEN_SRC: ../cannoli-kitchen
  KITCHEN_DEST: app/src/main/assets/kitchen

tasks:
  cores:
    desc: Fetch bundled libretro cores for arm64-v8a and armeabi-v7a
    vars:
      CORES:
        - fbneo
        - gambatte
        - genesis_plus_gx
        - gpsp
        - handy
        - mame2003_plus
        - mednafen_ngp
        - mednafen_pce_fast
        - mednafen_vb
        - mednafen_wswan
        - mgba
        - nestopia
        - pcsx_rearmed
        - pokemini
        - prosystem
        - snes9x
        - stella
        - swanstation
    cmds:
      - mkdir -p {{.CORES_DIR}}/arm64-v8a {{.CORES_DIR}}/armeabi-v7a
      - for:
          var: CORES
        cmd: |
          for arch in arm64-v8a armeabi-v7a; do
            zip="{{.ITEM}}_libretro_android.so.zip"
            dest="{{.CORES_DIR}}/${arch}"
            if [ -f "${dest}/{{.ITEM}}_libretro_android.so" ]; then
              echo "SKIP ${arch}/{{.ITEM}}"
              continue
            fi
            echo "FETCH ${arch}/{{.ITEM}}"
            curl -sfL "{{.BUILDBOT}}/${arch}/${zip}" -o "/tmp/${zip}" && \
              unzip -o "/tmp/${zip}" -d "${dest}" && \
              rm "/tmp/${zip}" || \
              echo "FAIL ${arch}/{{.ITEM}}"
          done

  cores:clean:
    desc: Remove all downloaded cores
    cmds:
      - rm -rf {{.CORES_DIR}}

  credits:sync:
    desc: Sync credits.json to CreditsOverlay.kt, README.md, and taskfile.yml
    cmds:
      - python3 scripts/sync_credits.py

  kitchen:
    desc: Build cannoli-kitchen and copy dist into app assets
    dir: '{{.KITCHEN_SRC}}'
    cmds:
      - bun run build
      - rm -rf {{.USER_WORKING_DIR}}/{{.KITCHEN_DEST}}/*
      - cp -R dist/. {{.USER_WORKING_DIR}}/{{.KITCHEN_DEST}}/
